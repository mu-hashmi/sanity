sandbox:
  snapshot: daytonaio/sandbox:0.6.0
  env:
    NODE_ENV: test
  secrets:
    - STRIPE_TEST_KEY

setup:
  - npm install
  - npm run build

app:
  start: npm run dev -- --host 0.0.0.0
  port: 3000
  healthcheck: /

scenarios:
  pr:
    driver: agent
    paths:
      - src/team-invites/**
    instructions: .sanity/checks/team-invites.md
    max_minutes: 10

  smoke:
    driver: command
    command: npm test -- --runInBand
    max_minutes: 5

artifacts:
  recording: true
  screenshots: true
  logs: true
